<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Boutique Store</title>

  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/auth.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

  <div class="authcontainer">
    <div class="authform">
      <div class="authheader">
        <div class="authlogo">
          Boutique<span class="logospan">Store</span>
        </div>
        <p class="authsubtitle">Sign in to your account</p>
      </div>

      <form id="loginForm">
        <div class="formgroup">
          <label class="formlabel" for="loginEmail">Email</label>
          <input type="email" id="loginEmail" class="formcontrol" value="admin@boutique.com" required>
        </div>
        <div class="formgroup">
          <label class="formlabel" for="loginPassword">Password</label>
          <input type="password" id="loginPassword" class="formcontrol" value="password123" required>
        </div>
        <p id="errorMsg" class="errormsg">Invalid email or password.</p>

        <button type="submit" id="loginBtn" class="loginbtn">Log in</button>
      </form>

      <div class="authfooter">
        <p class="authtest">
          Test: admin@boutique.com · store@boutique.com · seller@boutique.com<br>
          Password: password123
        </p>
        <a href="index.html" class="authback">← Back to Homepage</a>
      </div>
    </div>
  </div>

  <script src="../js/mockData.js"></script>
  <script src="../js/auth.js"></script>
</body>

</html>
